
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scherma Score App{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/logo.jpg">
    <link type="text/css" rel="stylesheet" href="{{url_for('static', filename='mystyle.css')}}"/>
{#    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js" integrity="sha384-c79GN5VsunZvi+Q/WObgk2in0CbZsHnjEqvFxC5DxHn9lTfNce2WW6h2pH6u/kF+" crossorigin="anonymous"></script>#}
    <script type="text/javascript" src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #000000; /* linear-gradient(135deg, #667eea 0%, #764ba2 100%);*/
            min-height: 100vh;
            /*padding: 20px;*/
            padding-top: 0px !important;
            padding-bottom: 0px !important;
            padding-right: 0px !important;
            padding-left: 0px !important;
        }
        
        .container {
            /*max-width: 1200px;*/
            margin: 0 0 0 0;
            background: #000000;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            height: auto;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            display: none;
        }
        
        .nav {
            background: #34495e;
            padding: 10px 20px;
            display: none;
        }
        
        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            padding: 8px 16px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .nav a:hover {
            background: #3498db;
        }
        
        .content {
            padding: 0px !important;
            background-color: #000000;
        }
        
        .btn {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #2980b9;
        }
        
        .btn-danger {
            background: #e74c3c;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        
        .game-card {
            /*border: 1px solid #ddd;*/
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 0px;
            background: #000000;
            height: 768px;
        }
        
        .score-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            color: #2c3e50;
            position: absolute;
            top: 800px;
            left: 2000px;
        }
        
        .team-names {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            position: absolute;
            top: 800px;
        }
        
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status.live {
            background: #e74c3c;
            color: white;
        }
        
        .status.final {
            background: #27ae60;
            color: white;
        }
        
        .status.scheduled {
            background: #f39c12;
            color: white;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Sports Score Tracker</h1>
        </div>
        
        <div class="nav">
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('add_game') }}">Add Game</a>
            <a href="{{ url_for('api_scores') }}" target="_blank">API</a>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
    <div id="pauseFallback" style="display:none; position:fixed; inset:0; background:#000; z-index:9999; align-items:center; justify-content:center;">
        <img src="/static/pausa.jpg" alt="Pausa" style="width:100%; height:100%; object-fit:contain; background:#000;" />
    </div>
</body>
<script type="application/javascript" src="/static/noc-to-flag.js"></script>
<script type="application/javascript">
    const socket = io({
        autoConnect: false,
        transports: ['websocket'],
        upgrade: false
    });
    const container = document.querySelector('.nomeSX');
    const containerDX = document.querySelector('.nomeDX');
    const appContainer = document.querySelector('.container');
    const pauseFallback = document.getElementById('pauseFallback');
    const pauseVideoContainer = document.getElementById('videoPausa');
    const pauseVideoPlayer = pauseVideoContainer ? pauseVideoContainer.querySelector('video') : null;
    const NO_SERIAL_TIMEOUT_MS = 10000;
    const UNCHANGED_TIMER_TIMEOUT_MS = 5 * 60 * 1000;
    const RETRY_INTERVAL_MS = 10000;
    let lastDataAt = Date.now();
    let lastTimerChangeAt = Date.now();
    let lastTimerValue = null;
    let fallbackActive = false;
    let fallbackReason = '';
    let pauseVideoActive = false;
    let pauseVideoReason = '';
    let pauseVideoList = [];
    let pauseVideoIndex = 0;
    let athletePhotoMap = {};
    let athletePhotoMapPromise = null;
    let currentAthleteNames = { left: '', right: '' };
    let ranking = 0;

    function showPauseFallback(reason) {
        if (fallbackActive) {
            return;
        }
        fallbackActive = true;
        fallbackReason = reason || '';
        if (appContainer) {
            appContainer.style.display = 'none';
        }
        if (pauseFallback) {
            pauseFallback.style.display = 'flex';
        }
        console.warn('Fallback ON:', reason);
    }

    function hidePauseFallback() {
        fallbackActive = false;
        fallbackReason = '';
        if (pauseFallback) {
            pauseFallback.style.display = 'none';
        }
        if (appContainer) {
            appContainer.style.display = '';
        }
    }

    function tryReconnect() {
        if (!fallbackActive) {
            return;
        }
        if (socket.disconnected) {
            socket.connect();
            return;
        }
        fetch('/api/scores', { cache: 'no-store' }).catch(() => {});
    }

    async function loadPauseVideos() {
        try {
            const response = await fetch('/api/pause-videos', { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const payload = await response.json();
            pauseVideoList = Array.isArray(payload.videos) ? payload.videos : [];
        } catch (error) {
            console.warn('Pause video list unavailable:', error && error.message ? error.message : error);
            pauseVideoList = [];
        }
        return pauseVideoList;
    }

    function hidePauseVideos() {
        pauseVideoActive = false;
        pauseVideoReason = '';
        if (pauseVideoContainer) {
            pauseVideoContainer.style.display = 'none';
        }
        if (pauseVideoPlayer) {
            try {
                pauseVideoPlayer.pause();
            } catch (_) {}
            pauseVideoPlayer.removeAttribute('src');
            pauseVideoPlayer.load();
        }
    }

    function playPauseVideoAt(index) {
        if (!pauseVideoActive || !pauseVideoPlayer || pauseVideoList.length === 0) {
            return;
        }
        pauseVideoIndex = (index + pauseVideoList.length) % pauseVideoList.length;
        const nextVideo = pauseVideoList[pauseVideoIndex];
        if (!nextVideo || !nextVideo.src) {
            return;
        }
        if (pauseVideoPlayer.getAttribute('src') !== nextVideo.src) {
            pauseVideoPlayer.setAttribute('src', nextVideo.src);
            pauseVideoPlayer.load();
        }
        pauseVideoPlayer.loop = false;
        pauseVideoPlayer.defaultMuted = false;
        pauseVideoPlayer.muted = false;
        pauseVideoPlayer.removeAttribute('muted');
        pauseVideoPlayer.volume = 1.0;
        pauseVideoPlayer.play().catch((err) => {
            console.warn('Pause video autoplay blocked:', err && err.message ? err.message : err);
        });
    }

    async function showPauseVideos(reason) {
        if (pauseVideoActive) {
            return;
        }
        if (!pauseVideoContainer || !pauseVideoPlayer) {
            showPauseFallback(`pause_video_missing:${reason}`);
            return;
        }
        if (pauseVideoList.length === 0) {
            await loadPauseVideos();
        }
        if (pauseVideoList.length === 0) {
            showPauseFallback(`pause_video_empty:${reason}`);
            return;
        }
        hidePauseFallback();
        pauseVideoActive = true;
        pauseVideoReason = reason || '';
        pauseVideoContainer.style.display = 'block';
        playPauseVideoAt(pauseVideoIndex);
        console.warn('Pause videos ON:', reason);
    }

    if (pauseVideoPlayer) {
        pauseVideoPlayer.addEventListener('ended', () => {
            if (!pauseVideoActive) {
                return;
            }
            playPauseVideoAt(pauseVideoIndex + 1);
        });
        pauseVideoPlayer.addEventListener('error', () => {
            if (!pauseVideoActive) {
                return;
            }
            playPauseVideoAt(pauseVideoIndex + 1);
        });
    }

    function updateText(selector, value) {
        if (!value) {
            return;
        }
        document.querySelectorAll(selector).forEach((el) => {
            if (el.textContent === value) {
                return;
            }
            el.textContent = value;
        });
    }

    function normalizeAthleteNameForPhoto(name) {
        return String(name || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toUpperCase()
            .replace(/[^A-Z0-9]+/g, ' ')
            .trim()
            .replace(/\s+/g, ' ');
    }

    async function loadAthletePhotoMap(forceReload = false) {
        if (forceReload) {
            athletePhotoMapPromise = null;
        }
        if (athletePhotoMapPromise) {
            return athletePhotoMapPromise;
        }
        athletePhotoMapPromise = fetch('/api/athlete-photos', { cache: 'no-store' })
            .then((response) => response.ok ? response.json() : { map: {} })
            .then((payload) => {
                athletePhotoMap = payload && payload.map ? payload.map : {};
                return athletePhotoMap;
            })
            .catch((error) => {
                console.warn('Athlete photo map unavailable:', error && error.message ? error.message : error);
                athletePhotoMap = {};
                return athletePhotoMap;
            });
        return athletePhotoMapPromise;
    }

    async function updateAthletePhoto(side, athleteName) {
        const photoSelector = side === 'left' ? '.fotoSX' : '.fotoDX';
        const normalizedName = normalizeAthleteNameForPhoto(athleteName);
        if (!normalizedName) {
            document.querySelectorAll(photoSelector).forEach((el) => {
                el.style.backgroundImage = '';
            });
            return;
        }

        const map = await loadAthletePhotoMap();
        let photoSrc = map[normalizedName] || '';
        if (!photoSrc) {
            const freshMap = await loadAthletePhotoMap(true);
            photoSrc = freshMap[normalizedName] || '';
        }
        document.querySelectorAll(photoSelector).forEach((el) => {
            el.style.backgroundImage = photoSrc ? `url("${photoSrc}")` : '';
            el.style.backgroundSize = 'cover';
            el.style.backgroundPosition = 'center';
            el.style.backgroundRepeat = 'no-repeat';
        });
    }

    function refreshAthletePhotosFromPage() {
        const leftName = document.querySelector('.nomeSX')?.textContent || '';
        const rightName = document.querySelector('.nomeDX')?.textContent || '';
        currentAthleteNames.left = leftName;
        currentAthleteNames.right = rightName;
        updateAthletePhoto('left', leftName);
        updateAthletePhoto('right', rightName);
    }

    function updateCompetitorFromSerial(payload) {
        const competitor = payload.competitor || payload;
        if (!competitor || !competitor.side) {
            return;
        }

        const isLeft = competitor.side === 'left';
        const nameSelector = isLeft ? '.nomeSX' : '.nomeDX';
        const countrySelector = isLeft ? '.countrySX' : '.countryDX';
        const flagSelector = isLeft ? '.flagSX img' : '.flagDX img';
        const nation = (competitor.nation || '').trim().toUpperCase();
        const flagCode = window.nocToFlag ? window.nocToFlag(nation) : '';

        currentAthleteNames[competitor.side] = competitor.name || '';
        updateText(nameSelector, (competitor.name || '').trim());
        updateText(countrySelector, nation);
        updateAthletePhoto(competitor.side, competitor.name || '');

        if (flagCode) {
            const nextSrc = `/static/flags/${flagCode}.svg`;
            document.querySelectorAll(flagSelector).forEach((img) => {
                if (!img.src.endsWith(nextSrc)) {
                    img.src = nextSrc;
                }
            });
        }

    }

    const elCache = {};
    const lastRenderedTabellone = {};
    let pendingTabellone = null;
    let renderScheduled = false;

    function getEl(id) {
        if (!elCache[id]) {
            elCache[id] = document.getElementById(id);
        }
        return elCache[id];
    }

    function setTextIfChanged(id, value) {
        const el = getEl(id);
        if (!el) {
            return;
        }
        const text = String(value ?? '');
        if (lastRenderedTabellone[`text:${id}`] === text) {
            return;
        }
        lastRenderedTabellone[`text:${id}`] = text;
        el.textContent = text;
    }

    function setBgIfChanged(id, value) {
        const el = getEl(id);
        if (!el) {
            return;
        }
        if (lastRenderedTabellone[`bg:${id}`] === value) {
            return;
        }
        lastRenderedTabellone[`bg:${id}`] = value;
        el.style.backgroundColor = value;
    }

    function setColorIfChanged(id, value) {
        const el = getEl(id);
        if (!el) {
            return;
        }
        if (lastRenderedTabellone[`color:${id}`] === value) {
            return;
        }
        lastRenderedTabellone[`color:${id}`] = value;
        el.style.color = value;
    }

    function timerColorFromMode(mode) {
        if (mode === 'N') {
            return '#FF0000';
        }
        if (mode === 'B' || mode === 'J') {
            return '#FFFF00';
        }
        return '#00FF00';
    }

    function cardCount(value) {
        const count = Number.parseInt(String(value ?? '').trim(), 10);
        return Number.isFinite(count) && count > 0 ? count : 0;
    }

    function renderPassivityCard(value, yellowId, redId) {
        const cardValue = Number.parseInt(String(value ?? '0').trim(), 10) || 0;
        setBgIfChanged(yellowId, cardValue === 1 ? '#FFFF00' : 'rgba(255,255,255,0%)');
        setTextIfChanged(yellowId, cardValue === 1 ? 'P' : '');

        setBgIfChanged(redId, cardValue >= 2 ? '#FF0000' : 'rgba(255,255,255,0%)');
        setTextIfChanged(redId, cardValue === 2 ? 'P' : (cardValue === 3 ? 'P2' : ''));
    }

    function renderTabellone(tabellone) {
        const statoDX = tabellone.G == 1 ? '#009900' : (tabellone.W == 1 ? '#FFFFFF' : 'rgba(255,255,255,0%)');
        const statoSX = tabellone.R == 1 ? '#990000' : (tabellone.w == 1 ? '#FFFFFF' : 'rgba(255,255,255,0%)');
        const redCardsDX = cardCount(tabellone.B);
        const redCardsSX = cardCount(tabellone.D);
        setBgIfChanged('statoDXbig', statoDX);
        setBgIfChanged('statoSXbig', statoSX);

        setColorIfChanged('timerText', timerColorFromMode(tabellone.timerMode));
        setTextIfChanged('timerText', String(tabellone.timer || '').trim());
        setTextIfChanged('XX', tabellone.XX);
        setTextIfChanged('YY', tabellone.YY);

        setBgIfChanged('CGDX', tabellone.A >= 1 ? '#FFFF00' : 'rgba(255,255,255,0%)');
        setBgIfChanged('CRDX', redCardsDX > 0 ? '#FF0000' : 'rgba(255,255,255,0%)');
        setTextIfChanged('CRDX', redCardsDX > 1 ? redCardsDX : '');
        setBgIfChanged('CGSX', tabellone.C >= 1 ? '#FFFF00' : 'rgba(255,255,255,0%)');
        setBgIfChanged('CRSX', redCardsSX > 0 ? '#FF0000' : 'rgba(255,255,255,0%)');
        setTextIfChanged('CRSX', redCardsSX > 1 ? redCardsSX : '');
        renderPassivityCard(tabellone.passivityRight, 'CGPDX', 'CRPDX');
        renderPassivityCard(tabellone.passivityLeft, 'CGPSX', 'CRPSX');

        setTextIfChanged('prioritaDX', tabellone.P == 1 ? 'P' : '');
        setTextIfChanged('prioritaSX', tabellone.P == 2 ? 'P' : '');
        setTextIfChanged('PR', tabellone.PR);
    }

    function scheduleTabelloneRender(tabellone) {
        pendingTabellone = tabellone;
        if (renderScheduled) {
            return;
        }
        renderScheduled = true;
        requestAnimationFrame(() => {
            renderScheduled = false;
            if (pendingTabellone) {
                renderTabellone(pendingTabellone);
                pendingTabellone = null;
            }
        });
    }

    socket.connect();
    refreshAthletePhotosFromPage();

    socket.on("connect", function() {
        // Keep fallback active until real serial data arrives.
    });

    socket.on("disconnect", function(reason) {
        showPauseFallback(`socket_disconnect:${reason}`);
    });

    socket.on("connect_error", function(err) {
        showPauseFallback(`socket_connect_error:${err && err.message ? err.message : 'unknown'}`);
    });

    socket.on("video_emit", function(video) {
        if (video.video == 'videoOn'){
            const src = video.src || '';
            hidePauseVideos();
            const videoContainers = [document.getElementById("videoPausa"), document.getElementById("videoSX"), document.getElementById("videoDX")];
            for (const containerEl of videoContainers) {
                if (containerEl) {
                    containerEl.style.display = 'block';
                }
            }

            const players = document.querySelectorAll('.videoPlayer');
            players.forEach((player) => {
                if (src) {
                    if (player.getAttribute('src') !== src) {
                        player.setAttribute('src', src);
                    }
                    player.load();
                }
                player.defaultMuted = false;
                player.muted = false;
                player.removeAttribute('muted');
                player.volume = 1.0;
                player.play().catch((err) => {
                    console.warn('Video autoplay with audio blocked by browser policy:', err && err.message ? err.message : err);
                });
            });
        }else{
            const videoContainers = [document.getElementById("videoPausa"), document.getElementById("videoSX"), document.getElementById("videoDX")];
            for (const containerEl of videoContainers) {
                if (containerEl) {
                    containerEl.style.display = 'none';
                }
            }
            pauseVideoActive = false;
            pauseVideoReason = '';
            const players = document.querySelectorAll('.videoPlayer');
            players.forEach((player) => {
                try {
                    player.pause();
                } catch (_) {}
            });
        }

    })

    socket.on("info_emit", function(info) {
        window.location.reload();
    })

    socket.on("competitor_emit", function(payload) {
        updateCompetitorFromSerial(payload);
    })

    socket.on("athlete_photos_changed", function() {
        athletePhotoMap = {};
        athletePhotoMapPromise = null;
        updateAthletePhoto('left', currentAthleteNames.left);
        updateAthletePhoto('right', currentAthleteNames.right);
    })

    socket.on("serial_alive", function() {
        lastDataAt = Date.now();
        if (pauseVideoReason === 'no_serial_data_timeout') {
            hidePauseVideos();
        }
        if (fallbackReason.includes('no_serial_data_timeout')) {
            hidePauseFallback();
        }
    })

    socket.on("punti_emit", function(tabellone) {
            const payload = tabellone.tabellone || {};
            const timerValue = String(payload.timer || '').trim();
            if (lastTimerValue === null) {
                lastTimerValue = timerValue;
                lastTimerChangeAt = Date.now();
            } else if (timerValue !== lastTimerValue) {
                lastTimerValue = timerValue;
                lastTimerChangeAt = Date.now();
                hidePauseVideos();
                hidePauseFallback();
            }
            lastDataAt = Date.now();
            if (pauseVideoReason === 'no_serial_data_timeout') {
                hidePauseVideos();
            }
            if (fallbackReason.includes('no_serial_data_timeout')) {
                hidePauseFallback();
            }
            scheduleTabelloneRender(payload);
        })

      setInterval(() => {
          const now = Date.now();
          if ((now - lastDataAt) > NO_SERIAL_TIMEOUT_MS) {
              showPauseVideos('no_serial_data_timeout');
              return;
          }
          if (lastTimerValue !== null && (now - lastTimerChangeAt) > UNCHANGED_TIMER_TIMEOUT_MS) {
              showPauseVideos('unchanged_timer_timeout');
          }
      }, 1000);

      setInterval(() => {
          tryReconnect();
      }, RETRY_INTERVAL_MS);

        setInterval(cambiaRank, 5000);

      function cambiaRank(){
          if(ranking == 0){
              document.getElementById('rankSX').textContent = 'R:'+{{ scores[0].rank1 }};
              document.getElementById('rankDX').textContent = 'R:'+{{ scores[0].rank2 }};
              ranking = 1;
          }else{
              document.getElementById('rankSX').textContent = 'C:'+{{ scores[0].classgir1 }};
              document.getElementById('rankDX').textContent = 'C:'+{{ scores[0].classgir2 }};
              ranking = 0;
          }
      }

      function wait(ms){
       var start = new Date().getTime();
       var end = start;
       while(end < start + ms) {
         end = new Date().getTime();
      }
}

</script>
</html>
